<!-- Nutrition Agent Card (Section 4 Part C) -->
<div id="nutrition-card" class="card" style="background:#3D2414;border-radius:20px;overflow:hidden;">
  <div style="border-top:3px solid #E8940A;padding:16px;">
    <h2 style="margin:0;color:#E8940A;font-family:'Playfair Display',serif;font-size:20px;">🥗 Nutrition Agent</h2>
    <h3 style="margin:4px 0 12px;color:#C4A882;font-family:'Inter',sans-serif;font-size:13px;">Your Personalized Diet Plan</h3>
  </div>
  <div style="text-align:center;margin-bottom:12px;">
    <div id="calorie-target" style="font-size:36px;color:#E8940A;font-family:'Inter',sans-serif;">--</div>
    <div style="color:#C4A882;font-size:12px;">kcal / day</div>
    <hr style="border:none;height:1px;background:#E8940A;margin:8px auto;width:60%;"/>
  </div>
  <div id="recommendations" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 12px;margin-bottom:12px;">
    <!-- pills injected by JS -->
  </div>
  <div style="display:flex;gap:8px;">
    <!-- Foods to AVOID -->
    <div style="flex:1;background:#2C1A0E;border-left:3px solid #dc2626;border-radius:0 12px 12px 0;overflow:hidden;">
      <h4 style="margin:8px;color:#E8940A;font-family:'Inter',sans-serif;font-size:14px;font-weight:bold;">⛔ Avoid These</h4>
      <ul id="avoid-list" style="list-style:none;padding-left:12px;margin:0;color:#FDF0E0;">
        <!-- items injected by JS -->
      </ul>
    </div>
    <!-- Foods to INCLUDE -->
    <div style="flex:1;background:#2C1A0E;border-left:3px solid #16a34a;border-radius:0 12px 12px 0;overflow:hidden;">
      <h4 style="margin:8px;color:#E8940A;font-family:'Inter',sans-serif;font-size:14px;font-weight:bold;">✅ Include These</h4>
      <ul id="include-list" style="list-style:none;padding-left:12px;margin:0;color:#FDF0E0;">
        <!-- items injected by JS -->
      </ul>
    </div>
  </div>
  <div id="healthy-msg" style="text-align:center;color:#16a34a;font-family:'Inter',sans-serif;font-size:14px;margin-top:12px;display:none;">
    ✅ Your nutrition profile looks great!
  </div>
</div>

<script>
  // Helper to create a pill element
  function createPill(text) {
    const pill = document.createElement('span');
    pill.textContent = text;
    pill.style.background = 'rgba(232,148,10,0.15)';
    pill.style.border = '1px solid #E8940A';
    pill.style.color = '#FDF0E0';
    pill.style.borderRadius = '50px';
    pill.style.padding = '6px 14px';
    pill.style.fontFamily = 'Inter, sans-serif';
    pill.style.fontSize = '12px';
    return pill;
  }

  function renderNutritionCard(patient) {
    // Calorie target (fallback to 1800 if not provided)
    const calorieDiv = document.getElementById('calorie-target');
    const calories = patient.daily_calories || 1800;
    calorieDiv.textContent = calories.toLocaleString();

    // Recommendations pills
    const recs = getNutritionRecommendations(patient);
    const recContainer = document.getElementById('recommendations');
    recContainer.innerHTML = '';
    recs.forEach(r => recContainer.appendChild(createPill(r)));

    // Avoid list
    const avoid = getAvoidFoods(patient);
    const avoidList = document.getElementById('avoid-list');
    avoidList.innerHTML = '';
    avoid.forEach(item => {
      const li = document.createElement('li');
      li.textContent = '• ' + item;
      li.style.color = '#FDF0E0';
      li.style.marginBottom = '4px';
      avoidList.appendChild(li);
    });

    // Include list
    const include = getIncludeFoods(patient);
    const includeList = document.getElementById('include-list');
    includeList.innerHTML = '';
    include.forEach(item => {
      const li = document.createElement('li');
      li.textContent = '• ' + item;
      li.style.color = '#FDF0E0';
      li.style.marginBottom = '4px';
      includeList.appendChild(li);
    });

    // Show healthy message when no extra recommendations (healthy patient)
    const healthyMsg = document.getElementById('healthy-msg');
    if (recs.length === 0) {
      healthyMsg.style.display = 'block';
    } else {
      healthyMsg.style.display = 'none';
    }
  }

  // --- Recommendation logic (provided) ---
  function getNutritionRecommendations(patient) {
    const recs = [];
    if (patient.blood_sugar > 126 || patient.hba1c > 6.5) {
      recs.push('Limit refined sugar');
      recs.push('Choose low GI foods');
      recs.push('Eat 5-6 small meals daily');
      recs.push('Increase dietary fiber');
    }
    if (patient.cholesterol > 200 || patient.ldl > 130) {
      recs.push('Avoid saturated fats');
      recs.push('Include omega-3 sources');
      recs.push('Add soluble fiber (oats)');
    }
    if (patient.bmi > 27) {
      recs.push('Reduce calorie intake');
      recs.push('Increase physical activity');
      recs.push('Avoid calorie-dense snacks');
    }
    if (patient.vitamin_d < 20) {
      recs.push('Supplement Vitamin D');
      recs.push('Include fortified foods');
    }
    if (patient.haemoglobin < 12) {
      recs.push('Include iron-rich foods');
      recs.push('Add Vitamin C sources');
    }
    recs.push('Stay hydrated — 2.5L water daily');
    recs.push('Eat varied whole foods');
    return [...new Set(recs)];
  }

  function getAvoidFoods(patient) {
    const avoid = [];
    if (patient.blood_sugar > 126) {
      avoid.push('White rice & refined carbs', 'Sugary desserts & sweets', 'Sugary beverages & juices', 'Processed snacks');
    }
    if (patient.cholesterol > 200) {
      avoid.push('Fried & deep-fried foods', 'Full-fat dairy products', 'Red meat & processed meat', 'Coconut oil in excess');
    }
    if (patient.bmi > 27) {
      avoid.push('High-calorie dense foods', 'Late night heavy meals');
    }
    return [...new Set(avoid)];
  }

  function getIncludeFoods(patient) {
    const include = [];
    if (patient.blood_sugar > 126) {
      include.push('Leafy greens (spinach, kale)', 'Quinoa & millets', 'Lentils & legumes', 'Berries & low-GI fruits');
    }
    if (patient.cholesterol > 200) {
      include.push('Fatty fish (salmon, mackerel)', 'Almonds & walnuts', 'Avocado', 'Oats & barley');
    }
    if (patient.vitamin_d < 20) {
      include.push('Egg yolk', 'Fortified milk', 'Mushrooms');
    }
    if (patient.haemoglobin < 12) {
      include.push('Spinach & dark leafy greens', 'Beetroot', 'Pomegranate', 'Lean red meat');
    }
    include.push('Fresh fruits & vegetables', 'Whole grains', 'Plenty of water');
    return [...new Set(include)];
  }

  // Listen for patient load event
  window.addEventListener('patientLoaded', (e) => {
    const patient = e.detail;
    renderNutritionCard(patient);
  });
</script>
